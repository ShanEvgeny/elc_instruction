<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Инструкции</title>
  <link rel="stylesheet" href="instruction_style.css">
  <script src="instructions.js" defer></script>
</head>
<body>

  <div class="container">
    <header class="page-header">
      <h1>Полезные инструкции</h1>
      <span>Для преподавателей</span>
    </header>

    <main>

      <!-- Вход -->
      <details class="main-section">
        <summary>Вход в электронное обучение</summary>

        <!-- Вход через el -->
        <details class="instruction-card">
          <summary>
            <span class="card-header">Вход через логин и пароль</span>
          </summary>
          <div id = "login_el"></div>
        </details>

        <!-- Вход через int -->
        <details class="instruction-card">
          <summary>
            <span class="card-header">Вход через личный кабинет</span>
          </summary>
          <div id = "login_int"></div>
        </details>

      </details>

      <!-- Организация работы в ЭОР -->
      <details class="main-section" open>
        <summary>Организация работы в ЭОР</summary>
        
            <!-- ИНСТРУКЦИЯ 1: ТЕСТЫ -->
            <details class="instruction-card">
              <summary>
                <span class="card-header">Создание тестов</span>
              </summary>
              <div id = "create_test"></div>
            </details>

            <!-- ИНСТРУКЦИЯ 2: ФАЙЛЫ -->
            <details class="instruction-card">
              <summary>
                <span class="card-header">Добавление файла</span>
              </summary>
              <div id = "create_file"></div>
            </details>

            <!-- ИНСТРУКЦИЯ 3: ЧАТ -->
            <details class="instruction-card">
              <summary>
                <span class="card-header">Добавление чата</span>
              </summary>
              <div id = "create_chat"></div>
            </details>

            <!-- Опрос -->
             <details class="instruction-card">
              <summary>
                <span class="card-header">Добавление опроса</span>
              </summary>
              <div id = "create_survey"></div>
            </details>

            <!-- Гиперссылка -->
            <details class="instruction-card">
              <summary>
                <span class="card-header">Добавление гиперссылки</span>
              </summary>
              <div id = "create_link"></div>
            </details>

            <!-- Зачисление пользователей на курс -->
            <details class="instruction-card">
              <summary>
                <span class="card-header">Зачисление пользователей на курс</span>
              </summary>
              <div id = "add_users_to_course"></div>
            </details>
            
      </details>

    </main>
  </div>
</body>
</html>
